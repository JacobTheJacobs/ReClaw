name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            ext: .exe
          - os: ubuntu-latest
            rid: linux-x64
            ext: ""
          - os: macos-latest
            rid: osx-arm64
            ext: ""
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish Desktop
        run: dotnet publish src/ReClaw.Desktop/ReClaw.Desktop.csproj -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish/desktop

      - name: Publish CLI
        run: dotnet publish src/ReClaw.Cli/ReClaw.Cli.csproj -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish/cli

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path publish/desktop/ReClaw.Desktop.exe -DestinationPath ReClaw-Desktop-${{ matrix.rid }}.zip
          Compress-Archive -Path publish/cli/ReClaw.Cli.exe -DestinationPath ReClaw-Cli-${{ matrix.rid }}.zip

      - name: Archive (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          chmod +x publish/desktop/ReClaw.Desktop publish/cli/ReClaw.Cli
          tar czf ReClaw-Desktop-${{ matrix.rid }}.tar.gz -C publish/desktop ReClaw.Desktop
          tar czf ReClaw-Cli-${{ matrix.rid }}.tar.gz -C publish/cli ReClaw.Cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: ReClaw-*-${{ matrix.rid }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
